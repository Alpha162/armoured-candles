name: version-bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump:
    if: >-
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip bump]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip non-merge commits
        id: merge_guard
        run: |
          set -euo pipefail
          parents=$(git rev-list --parents -n 1 HEAD | wc -w)
          if [ "$parents" -lt 3 ]; then
            echo "is_merge=false" >> "$GITHUB_OUTPUT"
            echo "Head commit is not a merge commit; skipping bump."
          else
            echo "is_merge=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.merge_guard.outputs.is_merge == 'true'
        id: bump
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          from pathlib import Path

          vf = Path('version.txt')
          raw = vf.read_text().strip()
          m = re.fullmatch(r'(v?)(\d+)\.(\d+)\.(\d+)', raw)
          if not m:
            raise SystemExit(f'Unsupported version format: {raw!r}')

          prefix, major, minor, patch = m.groups()
          new_version = f"{prefix}{major}.{minor}.{int(patch) + 1}"
          vf.write_text(new_version + '\n')
          print(f'new_version={new_version}')
          Path('/tmp/version_output').write_text(new_version)
          PY
          echo "new_version=$(cat /tmp/version_output)" >> "$GITHUB_OUTPUT"

      - name: Commit & push
        if: steps.merge_guard.outputs.is_merge == 'true'
        run: |
          set -euo pipefail
          if git diff --quiet -- version.txt; then
            echo "No version change detected."
            exit 0
          fi

          git config user.name "armoured-candles-bot"
          git config user.email "armoured-candles-bot@users.noreply.github.com"
          git add version.txt
          git commit -m "chore: bump firmware version to ${{ steps.bump.outputs.new_version }} [skip bump]"
          git push
