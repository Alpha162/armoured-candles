name: build-release

on:
  push:
    branches:
      - main
    paths:
      - version.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: >-
      github.actor != 'github-actions[bot]' ||
      contains(github.event.head_commit.message, 'chore: bump firmware version')
    runs-on: ubuntu-latest
    env:
      BOARD_FQBN: esp32:esp32:XIAO_ESP32S3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version metadata
        id: meta
        run: |
          set -euo pipefail
          VERSION=$(tr -d '[:space:]' < version.txt)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          BUILD_TS=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "build_ts=$BUILD_TS" >> "$GITHUB_OUTPUT"

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install core + deps
        run: |
          set -euo pipefail
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install ArduinoJson

      - name: Compile firmware
        run: |
          set -euo pipefail
          mkdir -p build
          arduino-cli compile \
            --fqbn "$BOARD_FQBN" \
            --output-dir build \
            --build-property compiler.cpp.extra_flags="-DFW_VERSION=\"${{ steps.meta.outputs.version }}\" -DFW_GIT_SHA=\"${{ steps.meta.outputs.short_sha }}\" -DFW_BUILD_TIMESTAMP=\"${{ steps.meta.outputs.build_ts }}\"" \
            .

      - name: Normalize binary name
        run: |
          set -euo pipefail
          BIN=$(find build -name '*.bin' | head -n 1)
          test -n "$BIN"
          cp "$BIN" "build/armoured-candles-${{ steps.meta.outputs.version }}.bin"

      - name: Create manifest
        run: |
          set -euo pipefail
          BIN="build/armoured-candles-${{ steps.meta.outputs.version }}.bin"
          SHA=$(sha256sum "$BIN" | awk '{print $1}')
          SIZE=$(stat -c%s "$BIN")
          cat > build/manifest.json <<JSON
          {
            "version": "${{ steps.meta.outputs.version }}",
            "url": "https://github.com/${{ github.repository }}/releases/download/fw-${{ steps.meta.outputs.version }}/armoured-candles-${{ steps.meta.outputs.version }}.bin",
            "sha256": "$SHA",
            "size": $SIZE,
            "board": "$BOARD_FQBN"
          }
          JSON

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.meta.outputs.version }}
          path: |
            build/armoured-candles-${{ steps.meta.outputs.version }}.bin
            build/manifest.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fw-${{ steps.meta.outputs.version }}
          name: Firmware ${{ steps.meta.outputs.version }}
          files: |
            build/armoured-candles-${{ steps.meta.outputs.version }}.bin
            build/manifest.json
